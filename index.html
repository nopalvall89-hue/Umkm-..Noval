<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakso & Drink Noval</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-pink-200 via-yellow-100 to-blue-200 font-sans">

<div class="max-w-5xl mx-auto p-6">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-green-400 to-blue-500 text-white rounded-2xl shadow-xl p-6 flex items-center gap-4">
    <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="w-16">
    <div>
      <h1 class="text-3xl font-bold">Bakso & Drink Noval</h1>
      <p>Bakso enak + minuman segar 🔥</p>
    </div>
  </div>

  <!-- FORM + CART -->
  <div class="grid md:grid-cols-2 gap-6 mt-6">

    <!-- FORM -->
    <div class="bg-gradient-to-br from-blue-100 to-purple-100 p-5 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-blue-700 mb-3">Data Pembeli</h2>

      <input placeholder="Nama"
        class="w-full mb-2 p-3 rounded-xl border-2 border-blue-300 focus:ring-2 focus:ring-blue-500">

      <textarea placeholder="Alamat"
        class="w-full mb-2 p-3 rounded-xl border-2 border-green-300 focus:ring-2 focus:ring-green-500"></textarea>

      <input placeholder="Catatan"
        class="w-full p-3 rounded-xl border-2 border-pink-300 focus:ring-2 focus:ring-pink-500">
    </div>

    <!-- CART -->
    <div class="bg-gradient-to-br from-green-100 to-yellow-100 p-5 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-green-700 mb-3">Keranjang</h2>

      <p>Bakso Urat x1</p>
      <p>Es Teh x1</p>

      <p class="mt-2">Subtotal: Rp20.000</p>
      <p>Ongkir: Rp5.000</p>
      <p class="font-bold text-lg">Total: Rp25.000</p>

      <button class="mt-3 w-full bg-gradient-to-r from-green-400 to-blue-500 text-white py-2 rounded-xl hover:scale-105 transition">
        Checkout WhatsApp
      </button>
    </div>

  </div>

  <!-- PRODUK -->
  <div class="mt-6">
    <h2 class="text-2xl font-bold text-purple-700 mb-4">Menu</h2>

    <div class="grid md:grid-cols-2 gap-6">

      <!-- Produk 1 -->
      <div class="bg-gradient-to-br from-red-100 to-orange-200 rounded-2xl shadow-lg overflow-hidden hover:scale-[1.05] transition">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-bold">Bakso Urat</h3>
          <p class="text-green-700 font-semibold">Rp15.000</p>
        </div>
      </div>

      <!-- Produk 2 -->
      <div class="bg-gradient-to-br from-yellow-100 to-pink-200 rounded-2xl shadow-lg overflow-hidden hover:scale-[1.05] transition">
        <img src="https://images.unsplash.com/photo-1625944525903-b4c3c0d2c77f" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-bold">Bakso Jumbo</h3>
          <p class="text-green-700 font-semibold">Rp18.000</p>
        </div>
      </div>

      <!-- Produk 3 -->
      <div class="bg-gradient-to-br from-blue-100 to-cyan-200 rounded-2xl shadow-lg overflow-hidden hover:scale-[1.05] transition">
        <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-bold">Es Teh</h3>
          <p class="text-green-700 font-semibold">Rp5.000</p>
        </div>
      </div>

      <!-- Produk 4 -->
      <div class="bg-gradient-to-br from-green-100 to-lime-200 rounded-2xl shadow-lg overflow-hidden hover:scale-[1.05] transition">
        <img src="https://images.unsplash.com/photo-1613478223719-2ab802602423" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-bold">Es Jeruk</h3>
          <p class="text-green-700 font-semibold">Rp7.000</p>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
